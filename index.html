<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A7BF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap');

:root {
  --bg: #F5F5F7; --sidebar-bg: #1D1D1F;
  --accent: #0071E3; --accent-soft: rgba(0,113,227,.06);
  --danger: #FF453A; --success: #30D158; --warning: #FFD60A;
  --text: #1D1D1F; --text-mid: #86868B; --text-light: #AEAEB2;
  --card: rgba(255,255,255,.72); --card-solid: #fff;
  --border: rgba(0,0,0,.04); --border-vis: rgba(0,0,0,.08);
  --radius: 14px; --radius-sm: 10px; --radius-xs: 8px;
  --blur: blur(20px) saturate(180%);
  --shadow-sm: 0 0.5px 1px rgba(0,0,0,.02);
  --shadow-md: 0 2px 8px rgba(0,0,0,.03), 0 0.5px 1px rgba(0,0,0,.02);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.06);
  --font: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: ui-monospace, 'SF Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-feature-settings:'cv11','ss01'}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
@keyframes smSlideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes smPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes progressFill{from{width:0}}
.fade-in{animation:fadeIn .3s cubic-bezier(.16,1,.3,1) both}
.progress-fill{animation:progressFill .8s ease-out both}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:3px}
input:focus,select:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(0,113,227,.08);outline:none}

/* ═ SIDEBAR ═ */
.sidebar{
  width:210px;display:flex;flex-direction:column;flex-shrink:0;
  background:linear-gradient(175deg,#E8E0F0 0%,#DDE4F2 40%,#E2E8F0 100%);
  border-right:1px solid rgba(0,0,0,.04);
  position:relative;overflow:hidden;
}
.sidebar::before{
  content:'';position:absolute;top:-30%;right:-30%;width:70%;height:60%;
  background:radial-gradient(ellipse,rgba(147,130,210,.12) 0%,transparent 70%);
  pointer-events:none;
}
.sidebar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:40%;
  background:radial-gradient(ellipse at 30% 100%,rgba(100,140,220,.08) 0%,transparent 70%);
  pointer-events:none;
}
.sidebar .logo{padding:24px 20px 20px;position:relative;z-index:1}
.sidebar .logo h2{font-size:14px;font-weight:600;color:#2D2B55;letter-spacing:-.01em}
.sidebar .logo p{font-size:10px;color:#8B85A8;margin-top:3px;font-weight:400}
.sidebar nav{flex:1;padding:0 10px;overflow-y:auto;position:relative;z-index:1}
.sidebar nav button{
  display:flex;align-items:center;gap:9px;width:100%;padding:7px 12px;
  border-radius:8px;border:none;cursor:pointer;
  font-size:13px;font-weight:400;font-family:var(--font);
  background:transparent;color:#6E6B8A;margin-bottom:1px;
  text-align:left;transition:all .15s cubic-bezier(.16,1,.3,1);
  position:relative;letter-spacing:-.01em;
}
.sidebar nav button:hover{color:#4A4768;background:rgba(255,255,255,.4)}
.sidebar nav button.active{
  background:rgba(255,255,255,.6);color:#2D2B55;font-weight:500;
  box-shadow:0 1px 3px rgba(0,0,0,.04),inset 0 0.5px 0 rgba(255,255,255,.8);
}
.sidebar nav button.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2.5px;height:14px;background:#7C6FC4;border-radius:0 2px 2px 0;
}
.sidebar nav button .badge{
  margin-left:auto;font-size:9px;font-weight:600;padding:1px 6px;
  border-radius:8px;color:#fff;
  background:linear-gradient(135deg,#8B7DC8,#6E8DD6);
  min-width:16px;text-align:center;
  box-shadow:0 1px 4px rgba(123,108,196,.25);
}
.sync-bar{
  padding:12px 16px;border-top:1px solid rgba(0,0,0,.04);
  position:relative;z-index:1;
  background:rgba(255,255,255,.25);
}
.sync-bar .sync-dot{width:5px;height:5px;border-radius:3px}
.sync-bar .sync-dot.synced,.sync-bar .sync-dot.cloud{background:#30D158}
.sync-bar .sync-dot.local{background:#FFD60A}
.sync-status{font-size:10px;display:flex;align-items:center;gap:4px;color:#6E6B8A}
.sync-status .dot{width:5px;height:5px;border-radius:3px}
.sync-status .dot.cloud{background:#30D158}.sync-status .dot.local{background:#FFD60A}.sync-status .dot.offline{background:#FF453A}

/* Dark sidebar */
body.dark .sidebar{
  background:linear-gradient(175deg,#1A1825 0%,#1E1D30 40%,#1A1926 100%);
  border-right:1px solid rgba(255,255,255,.03);
}
body.dark .sidebar::before{background:radial-gradient(ellipse,rgba(120,100,200,.06) 0%,transparent 70%)}
body.dark .sidebar::after{background:radial-gradient(ellipse at 30% 100%,rgba(80,110,200,.04) 0%,transparent 70%)}
body.dark .sidebar .logo h2{color:rgba(220,215,240,.85)}
body.dark .sidebar .logo p{color:rgba(160,155,190,.35)}
body.dark .sidebar nav button{color:rgba(180,175,210,.4)}
body.dark .sidebar nav button:hover{color:rgba(200,195,230,.65);background:rgba(255,255,255,.03)}
body.dark .sidebar nav button.active{background:rgba(255,255,255,.06);color:rgba(220,215,240,.9);box-shadow:none}
body.dark .sidebar nav button .badge{background:linear-gradient(135deg,rgba(120,100,200,.4),rgba(90,120,200,.4));color:rgba(255,255,255,.7);box-shadow:none}
body.dark .sync-bar{border-top-color:rgba(255,255,255,.03);background:rgba(0,0,0,.15)}
body.dark .sync-status{color:rgba(160,155,190,.4)}

/* ═ MAIN ═ */
main{flex:1;padding:36px 44px;overflow:auto}
h1{font-size:22px;font-weight:600;letter-spacing:-.03em}

/* ═ CARDS ═ */
.card{background:var(--card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:all .15s ease}
.card-hover:hover{box-shadow:var(--shadow-md);border-color:var(--border-vis)}

/* ═ INPUTS ═ */
.input,.select{padding:7px 11px;border-radius:var(--radius-xs);border:1px solid var(--border-vis);font-size:13px;font-family:var(--font);background:rgba(255,255,255,.6);color:var(--text);outline:none;transition:all .12s}
textarea.input{resize:vertical}

/* ═ BUTTONS ═ */
.btn{padding:6px 12px;border-radius:var(--radius-xs);border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);transition:all .1s;letter-spacing:-.01em}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.06)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-default{background:rgba(0,0,0,.03);color:var(--text-mid)}
.btn-default:hover{background:rgba(0,0,0,.06)}
.btn-ghost{background:transparent;color:var(--text-light);font-weight:400}
.btn-ghost:hover{color:var(--text-mid)}

/* ═ BADGES ═ */
.status-badge{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap}
.proj-tag{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:9.5px;font-weight:500;white-space:nowrap}

/* ═ ACTIONS ═ */
.action-btns{display:flex;gap:2px;align-items:center;flex-shrink:0}
.action-btns .toggle-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:2px;line-height:1;transition:all .1s;border-radius:4px;color:#D1D1D6}
.action-btns .toggle-btn:hover{background:rgba(0,0,0,.03)}
.action-btns .toggle-btn.on-prio{color:#AF52DE}
.action-btns .toggle-btn.on-today{color:var(--accent)}
.action-btns .toggle-btn.off{color:#D1D1D6}
.action-btns select{padding:2px 4px;border-radius:5px;border:1px solid var(--border-vis);font-size:10px;font-family:var(--font);background:transparent;color:var(--text-mid);width:72px}

/* ═ TABLE ═ */
table{width:100%;border-collapse:separate;border-spacing:0}
th{padding:8px 12px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);border-bottom:1px solid var(--border-vis);text-align:left;background:transparent}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
tr{transition:background .08s;cursor:pointer}
tr:hover{background:var(--accent-soft)!important}

/* ═ MODAL ═ */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.modal{background:var(--card-solid);border-radius:18px;padding:24px;width:92%;max-width:520px;max-height:85vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.1);animation:scaleIn .2s cubic-bezier(.16,1,.3,1)}

/* ═ TOAST ═ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sidebar-bg);color:rgba(255,255,255,.9);padding:9px 22px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;animation:scaleIn .2s ease-out;box-shadow:0 8px 32px rgba(0,0,0,.18)}

/* ═ AUTH ═ */
.gauth-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.gauth-overlay h1{font-size:28px;font-weight:600;letter-spacing:-.03em}
.gauth-overlay p{font-size:14px;color:var(--text-mid);max-width:360px;text-align:center;line-height:1.7}
.gauth-btn{padding:11px 24px;border-radius:12px;border:1px solid var(--border-vis);background:#fff;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-md);transition:all .12s}
.gauth-btn:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.gauth-btn svg{width:20px;height:20px}
.gauth-skip{background:none;border:none;color:var(--text-light);font-size:12px;cursor:pointer;font-family:var(--font);margin-top:8px}

/* ═ DARK ═ */
body.dark{--bg:#15151E;--card:rgba(30,30,42,.75);--card-solid:#1C1C28;--border:rgba(255,255,255,.06);--border-vis:rgba(255,255,255,.1);--text:#E8E6F0;--text-mid:#8A88A0;--text-light:#505060;--sidebar-bg:#0F0F18;--accent-soft:rgba(100,120,220,.08)}
body.dark .sidebar{border-right:1px solid rgba(255,255,255,.03);background:linear-gradient(180deg,#050508 0%,#000 100%)}
body.dark .input,body.dark .select{background:rgba(35,35,50,.6);color:#E8E6F0;border-color:rgba(255,255,255,.08)}
body.dark th{border-color:var(--border);background:rgba(255,255,255,.02)}
body.dark .gauth-overlay{background:#15151E}
body.dark .gauth-btn{background:#1C1C28;color:#E8E6F0;border-color:rgba(255,255,255,.08)}
body.dark .toast{background:rgba(220,218,240,.92);color:#1A1825}
body.dark .btn-default{background:rgba(255,255,255,.06);color:var(--text-mid);border:1px solid rgba(255,255,255,.06)}

/* ═ SELF MAP ═ */
.sm-hero{background:#1D1D1F;border-radius:18px;padding:24px;color:rgba(255,255,255,.9);margin-bottom:16px}
body.dark .sm-hero{background:#1C1C1E;border:1px solid rgba(255,255,255,.04)}
.sm-pillar{border-radius:var(--radius);overflow:hidden;margin-bottom:10px;border:1px solid var(--border);background:var(--card);backdrop-filter:var(--blur)}
.sm-pillar-head{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s}
.sm-pillar-head:hover{background:var(--accent-soft)}
.sm-area{padding:14px 18px;border-top:1px solid var(--border);animation:smSlideUp .2s cubic-bezier(.16,1,.3,1) both}
.sm-score-dot{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:all .1s}
.sm-score-dot:hover{transform:scale(1.12)}
.sm-score-dot.active{color:#fff}
.sm-field{display:flex;flex-direction:column;gap:3px}
.sm-field label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sm-field textarea{border:1px solid var(--border);border-radius:var(--radius-xs);padding:8px 10px;font-size:11px;line-height:1.5;font-family:var(--font);resize:vertical;min-height:32px;background:var(--card);color:var(--text)}
.sm-timeline-dot{width:6px;height:6px;border-radius:2px;display:inline-block;cursor:pointer;transition:transform .1s}
.sm-timeline-dot:hover{transform:scale(2)}
.sm-lock{min-height:70vh;display:flex;align-items:center;justify-content:center}
.sm-lock-card{background:#1D1D1F;border-radius:24px;padding:48px;text-align:center;color:rgba(255,255,255,.9);max-width:340px;box-shadow:0 24px 80px rgba(0,0,0,.15)}
.radar-svg{filter:drop-shadow(0 1px 4px rgba(0,0,0,.04))}

/* ═ COACH ═ */
.coach-chat{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.coach-msg{padding:12px 16px;border-radius:14px;font-size:13px;line-height:1.7;max-width:85%;animation:smSlideUp .2s ease-out}
.coach-msg.ai{background:rgba(0,0,0,.03);align-self:flex-start;border-radius:4px 14px 14px 14px}
.coach-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-radius:14px 4px 14px 14px}
body.dark .coach-msg.ai{background:rgba(255,255,255,.04)}
.coach-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.coach-quick button{padding:8px 14px;border-radius:20px;border:1px solid var(--border-vis);background:var(--card);backdrop-filter:var(--blur);color:var(--text);font-size:12px;font-weight:400;cursor:pointer;font-family:var(--font);transition:all .1s}
.coach-quick button:hover{border-color:var(--accent);color:var(--accent)}
.coach-typing{display:flex;gap:4px;padding:12px 16px}
.coach-typing span{width:5px;height:5px;border-radius:3px;background:var(--text-light);animation:smPulse 1.2s ease-in-out infinite}
.coach-typing span:nth-child(2){animation-delay:.2s}
.coach-typing span:nth-child(3){animation-delay:.4s}

/* ═ KANBAN ═ */
.kanban-col{min-width:260px;flex:1}
.kanban-card{padding:12px 14px;border-radius:var(--radius-sm);background:var(--card);backdrop-filter:var(--blur);border:1px solid var(--border);margin-bottom:6px;cursor:grab;transition:all .12s;box-shadow:var(--shadow-sm)}
.kanban-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}

/* ═ LAUNCH ═ */
.launch-screen{position:fixed;inset:0;z-index:8000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;color:rgba(255,255,255,.9);gap:16px;cursor:pointer;animation:fadeIn .4s}
.launch-screen .streak-ring{width:140px;height:140px;border-radius:70px;border:2px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative}
.launch-screen .streak-ring svg{position:absolute;inset:-2px}

/* ═ MOBILE ═ */
@media(max-width:768px){
  body{flex-direction:column;height:auto;overflow:auto}
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:8px}
  .sidebar .logo{padding:8px 12px}
  .sidebar .logo p{display:none}
  .sidebar nav{display:flex;flex-wrap:wrap;gap:2px;padding:4px;flex:1}
  .sidebar nav button{padding:6px 8px;font-size:11px;gap:4px;margin:0}
  .sidebar nav div[style*="uppercase"]{display:none}
  main{padding:16px}
  h1{font-size:20px}
  .modal{width:95%;padding:18px;border-radius:14px}
  .sm-area > div:last-child{grid-template-columns:1fr!important}
  .sm-score-dot{width:28px;height:28px;font-size:10px}
  .sync-bar{padding:4px 8px}
}
</style>
</head>
<body>

<!-- Google Auth Overlay (shown until signed in or skipped) -->
<div class="gauth-overlay" id="auth-overlay">
  <h1>Action Tracker</h1>
  <p>Sign in with Google to sync your data across all devices via Google Drive. No app installation needed.</p>
  <button class="gauth-btn" onclick="handleGoogleSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>
  <button class="gauth-skip" onclick="skipAuth()">Skip — use local storage only</button>
  <p style="font-size:11px;color:#8896A6;margin-top:20px">First time? See the setup guide below for the one-time Google Cloud config.</p>
</div>

<div class="sidebar">
  <div class="logo">
    <h2>Action Tracker</h2>
    <p id="action-count">149 actions</p>
    <p style="font-size:8px;color:#4A7BF7;opacity:.6;margin-top:1px;font-family:var(--mono)">v7.0</p>
  </div>
  <nav id="nav"></nav>
  <div style="padding:6px 12px;border-top:1px solid rgba(255,255,255,.06)">
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px;width:100%" onclick="state.dark=!state.dark;document.body.classList.toggle('dark');localStorage.setItem('at-dark',state.dark);applyTheme()">&#9681; Dark mode</button>
  </div>
  <div class="sync-bar">
    <div id="sync-indicator" class="sync-status"><div class="dot local" id="sync-dot"></div><span id="sync-label">Local</span></div>
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px" onclick="forceSyncFromDrive()">Pull</button>
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px" onclick="forceSyncToDrive()">Push</button>
  </div>
  <div class="sync-bar" style="padding:4px 12px">
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px" onclick="exportJSON()">JSON</button>
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px" onclick="exportMD()">Report</button>
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px" onclick="toggleDark()" title="Toggle dark mode (D)">&#9681;</button>
    <button class="btn btn-ghost" style="font-size:10px;padding:4px 8px" onclick="document.getElementById('import-file').click()" title="Import JSON data file">JSON Import</button>
    <input type="file" id="import-file" accept=".json" hidden onchange="importJSON(event)">
  </div>
</div>
<main id="main"></main>
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════
// GOOGLE DRIVE API CONFIG
// ═══════════════════════════════════════
// *** REPLACE THESE WITH YOUR OWN VALUES ***
// See setup guide at the bottom of this file
const APP_VERSION = 'v6.3';
console.log('%c Action Tracker ' + APP_VERSION, 'background:#4A7BF7;color:#fff;padding:4px 8px;border-radius:4px;font-weight:bold');

// ═══ MINIMAL SVG ICONS ═══
const ICON={
  play:'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3,1.5 10.5,6 3,10.5"/></svg>',

const GDRIVE_CLIENT_ID = '459978244160-e3fr4idsonk1bfupul2c7ts4rlk69f1r.apps.googleusercontent.com';
const GDRIVE_API_KEY = 'YOUR_API_KEY_HERE';
const GDRIVE_FILE_NAME = 'action_tracker_data.json';
const GDRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.file';

let gdriveToken = null;
let gdriveFileId = null;
let gdriveEnabled = false;
let syncDebounceTimer = null;

// ═══════════════════════════════════════
// GOOGLE AUTH
// ═══════════════════════════════════════
async function handleGoogleSignIn() {
  if (GDRIVE_CLIENT_ID === 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
    alert('Setup required!\n\nYou need to configure Google Cloud credentials first.\n\nSee the setup guide:\n1. Go to console.cloud.google.com\n2. Create a project\n3. Enable Drive API\n4. Create OAuth credentials\n5. Paste the Client ID and API Key into this HTML file\n\nDetailed steps are in the README.');
    return;
  }
  try {
    // Use Google Identity Services (GIS) tokenClient
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPES,
      callback: async (response) => {
        if (response.error) { console.error('Auth error:', response); return; }
        gdriveToken = response.access_token;
        gdriveEnabled = true;
        document.getElementById('auth-overlay').style.display = 'none';
        updateSyncStatus('cloud', 'Google Drive');
        await findOrCreateDriveFile();
        await loadFromDrive();
        render();
      }
    });
    client.requestAccessToken();
  } catch(e) {
    console.error('Sign-in failed:', e);
    alert('Sign-in failed. Check console for details.');
  }
}

function skipAuth() {
  document.getElementById('auth-overlay').style.display = 'none';
  gdriveEnabled = false;
  updateSyncStatus('local', 'Local only');

function updateSyncStatus(type, label) {

}

// ═══════════════════════════════════════
// GOOGLE DRIVE FILE OPERATIONS
// ═══════════════════════════════════════
async function gdriveRequest(url, options = {}) {
  if (!gdriveToken) return null;
  const resp = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + gdriveToken, ...(options.headers || {}) }
  });
  if (resp.status === 401) { gdriveToken = null; gdriveEnabled = false; updateSyncStatus('offline', 'Token expired'); return null; }
  return resp;
}

async function findOrCreateDriveFile() {
  // Search for existing file
  const searchResp = await gdriveRequest(
    `https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_FILE_NAME}'+and+trashed=false&spaces=drive&fields=files(id,name,modifiedTime)`
  );
  if (!searchResp) return;
  const data = await searchResp.json();
  if (data.files && data.files.length > 0) {
    gdriveFileId = data.files[0].id;
    console.log('Found Drive file:', gdriveFileId);
    return;
  }
  // Create new file
  const metadata = { name: GDRIVE_FILE_NAME, mimeType: 'application/json' };
  const createResp = await gdriveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(metadata)
  });
  if (!createResp) return;
  const created = await createResp.json();
  gdriveFileId = created.id;
  console.log('Created Drive file:', gdriveFileId);
  // Write initial data
  await saveToDrive();
}

async function loadFromDrive() {
  if (!gdriveFileId || !gdriveToken) return false;
  try {
    const resp = await gdriveRequest(`https://www.googleapis.com/drive/v3/files/${gdriveFileId}?alt=media`);
    if (!resp || !resp.ok) return false;
    const text = await resp.text();
    if (!text || text.length < 10) return false;
    const d = JSON.parse(text);
    if (d.actions && d.actions.length) {
      state.actions = d.actions.map(a => ({startDate:"",deps:[],isMilestone:false,gantt:false,priority:false,todayFocus:false,sortIdx:0,...a}));
      state.meetings = d.meetings || [];
      state.archived = d.archived || [];
      state.subProjects = d.subProjects || {};
      state.milestones = d.milestones || [];
      state.diary = d.diary || {areas:[],entries:{},habits:{}};
      // Also save to localStorage as backup
      localStorage.setItem(STORE_KEY, JSON.stringify(d));
      updateSyncStatus('cloud', 'Synced');
      return true;
    }
  } catch(e) { console.error('Load from Drive failed:', e); }
  return false;
}

async function saveToDrive() {
  if (!gdriveFileId || !gdriveToken) return;
  const d = { actions: state.actions, meetings: state.meetings, archived: state.archived, subProjects: state.subProjects, milestones: state.milestones, diary: state.diary };
  try {
    await gdriveRequest(`https://www.googleapis.com/upload/drive/v3/files/${gdriveFileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(d)
    });
    updateSyncStatus('cloud', 'Synced');
  } catch(e) {
    console.error('Save to Drive failed:', e);
    updateSyncStatus('offline', 'Sync failed');
  }
}

function debouncedDriveSync() {
  if (!gdriveEnabled) return;
  clearTimeout(syncDebounceTimer);
  updateSyncStatus('local', 'Saving...');
  syncDebounceTimer = setTimeout(() => saveToDrive(), 1500);
}

async function forceSyncToDrive() {
  if (!gdriveEnabled) { toast('Not signed in to Google'); return; }
  updateSyncStatus('local', 'Pushing...');
  await saveToDrive();
  toast('Pushed to Drive');
}

async function forceSyncFromDrive() {
  if (!gdriveEnabled) { toast('Not signed in to Google'); return; }
  updateSyncStatus('local', 'Pulling...');
  const ok = await loadFromDrive();
  if (ok) { render(); toast('Pulled from Drive'); }
  else toast('Pull failed');
}

function importMD(md) {
  const lines = md.split("\n"); let meeting="",cols=[],inT=false,pastS=false;const newActions=[];

    const mh=l.match(/^#{2,3}\s*Meeting\s*(\d+)\s*[\u2014\u2013-]\s*(?:(\d{1,2}\s+\w+\s+\d{4})\s*:\s*)?(.+?)$/i);
    if(mh){meeting=`Meeting ${mh[1]}`;inT=false;pastS=false;continue;}
    if(l.startsWith("|")&&l.includes("Action")&&l.includes("Owner")){inT=true;pastS=false;cols=l.split("|").map(s=>s.trim().toLowerCase()).filter(Boolean);continue;}
    if(inT&&!pastS&&/^\|[\s\-|]+\|$/.test(l)){pastS=true;continue;}
    if(inT&&pastS&&l.startsWith("|")){const c=l.split("|").map(s=>s.trim()).filter(Boolean);if(c.length>=3){
      const get=(name)=>{const i=cols.findIndex(h=>h.includes(name));return i>=0&&i<c.length?c[i]:"";}
      const due=get("due"),proj=get("project");let st=get("status")||c[c.length-1]||"Open";
      st=st.trim();if(st.startsWith("Done"))st="Done";if(!STATUSES.includes(st))st="Open";
      let pd="";const dm=due.match(/(\d{1,2})\s*(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s*(\d{4})?/i);
      if(dm){const mo={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};pd=`${dm[3]||"2026"}-${mo[dm[2].toLowerCase()]}-${dm[1].padStart(2,"0")}`;}
      newActions.push({id:uid(),num:c[0],action:get("action")||c[1],owner:get("owner")||c[2],due:pd,dueRaw:due,measurable:get("measurable")||get("outcome")||"",status:st,meeting,createdAt:todayISO(),notes:"",project:proj||"Imported",subproject:"",startDate:"",deps:[],isMilestone:false,gantt:false,priority:false,todayFocus:false,sortIdx:Date.now()});
    }}
    if(inT&&pastS&&!l.startsWith("|")&&l!==""){inT=false;pastS=false;}
  }
  return newActions;
}

function getStats() {
  const a = state.actions;
  const done = a.filter(x=>x.status==="Done").length;
  const open = a.filter(x=>x.status==="Open").length;
  const prog = a.filter(x=>x.status==="In progress").length;
  const overdue = a.filter(x=>isOverdue(x.due,x.status)).length;
  const prio = a.filter(x=>x.priority&&x.status!=="Done"&&x.status!=="Cancelled").length;
  const inbox = a.filter(x=>x.status!=="Done"&&x.status!=="Cancelled"&&(x.project==="Imported"||x.project==="Untagged"||!x.due||!x.measurable)).length;
  const today = a.filter(x=>x.status!=="Done"&&x.status!=="Cancelled"&&(x.todayFocus||x.due===todayISO())).length;
  const xp = done * 10;
  const level = Math.floor(xp / 100) + 1;
  return { total:a.length, done, open, prog, overdue, prio, inbox, today, xp, level, xpInLevel:xp%100 };
}
function getProjects() {
  const all = [...new Set(state.actions.map(a=>a.project))].filter(Boolean);
  const defOrd=[];  // Order from user preferences
  return all.sort((a,b)=>{
    const oa=state.projOrder.indexOf(a),ob=state.projOrder.indexOf(b);
    if(oa>=0&&ob>=0) return oa-ob;
    if(oa>=0) return -1; if(ob>=0) return 1;
    return (defOrd.indexOf(a)<0?99:defOrd.indexOf(a))-(defOrd.indexOf(b)<0?99:defOrd.indexOf(b));
  });
}
function getOwners() {
  return [...new Set(state.actions.map(a=>a.owner))].filter(Boolean).sort();
}

function addSub(proj,name,parent){if(!name||!name.trim())return;const full=parent?(parent+" / "+name.trim()):name.trim();if(!state.subProjects[proj])state.subProjects[proj]=[];if(state.subProjects[proj].includes(full)){toast("Already exists");return;}state.subProjects[proj].push(full);saveState();render();toast("Created: "+full);}
function deleteSub(proj,sub){if(!confirm("Remove '"+subLabel(sub)+"' and its children?"))return;state.subProjects[proj]=(state.subProjects[proj]||[]).filter(s=>s!==sub&&!s.startsWith(sub+" / "));state.actions=state.actions.map(a=>a.project===proj&&(a.subproject===sub||a.subproject?.startsWith(sub+" / "))?{...a,subproject:""}:a);saveState();render();toast("Removed "+subLabel(sub));}
function subDepth(s){return s?s.split(" / ").length-1:0;}
function subLabel(s){return s?s.split(" / ").pop():s;}
function toggleSelect(id){if(state.selected.has(id))state.selected.delete(id);else state.selected.add(id);render();}
function selectAllFiltered(checked){if(checked&&window._filteredIds){window._filteredIds.forEach(id=>state.selected.add(id));}else{state.selected.clear();}render();}
function bulkPatch(upd){state.selected.forEach(id=>{state.actions=state.actions.map(a=>a.id===id?{...a,...upd}:a);});state.selected=new Set();saveState();render();toast("Updated");}
function bulkArchive(){state.selected.forEach(id=>{const a=state.actions.find(x=>x.id===id);if(a){state.archived.push({...a,archivedAt:todayISO()});state.actions=state.actions.filter(x=>x.id!==id);}});state.selected=new Set();saveState();render();toast("Archived");}
function handleReorder(fromId,toId){
  if(!fromId||!toId||fromId===toId)return;
  // Move all selected (or just the dragged one)
  const ids = state.selected.size>0&&state.selected.has(fromId) ? [...state.selected] : [fromId];
  const ti=state.actions.findIndex(a=>a.id===toId);
  if(ti<0)return;
  const moving=state.actions.filter(a=>ids.includes(a.id));
  state.actions=state.actions.filter(a=>!ids.includes(a.id));
  const newTi=state.actions.findIndex(a=>a.id===toId);
  state.actions.splice(newTi>=0?newTi:state.actions.length,0,...moving);
  state.actions.forEach((a,i)=>a.sortIdx=i);
  state.selected=new Set();saveState();render();
}
function handleDropToProject(proj,sub){
  // Move dragged (+ selected) actions to a project/sub-project
  const ids = state.selected.size>0&&state.selected.has(state.dragId) ? [...state.selected] : (state.dragId?[state.dragId]:[]);
  if(!ids.length)return;
  ids.forEach(id=>{state.actions=state.actions.map(a=>a.id===id?{...a,project:proj,subproject:sub||""}:a);});
  state.selected=new Set();state.dragId=null;saveState();render();toast("Moved "+ids.length+" to "+proj+(sub?" / "+subLabel(sub):""));
}

function collapseAll(collapse){const projs=getProjects();projs.forEach(p=>{state.projCollapsed[p]=collapse;getSubs(p).forEach(s=>{state.subCollapsed[p+'//'+s]=collapse;});});saveState();render();}
function collapseSubsOnly(collapse){const projs=getProjects();projs.forEach(p=>{getSubs(p).forEach(s=>{state.subCollapsed[p+'//'+s]=collapse;});});saveState();render();}
function toggleSubCollapse(proj,sub){const key=proj+'//'+sub;state.subCollapsed[key]=!state.subCollapsed[key];saveState();render();}
function reorderProj(targetP){

}

function smLock(){
  state.diary.unlocked=false;
  render();
}

function smEntry(date){
  smInit();
  if(!state.diary.entries[date])state.diary.entries[date]={};
  return state.diary.entries[date];
}

function smSaveField(date,area,field,val){
  const e=smEntry(date);
  if(!e[area])e[area]={repeat:"",improve:"",action:"",score:0};
  e[area][field]=val;
  saveState();
}

function smFilledDates(){
  smInit();
  return Object.keys(state.diary.entries).filter(d=>{
    const e=state.diary.entries[d];
    return Object.keys(e).some(k=>SM_ALL_AREAS.includes(k)&&(e[k].repeat||e[k].improve||e[k].action||e[k].score));
  }).sort();
}

function smTimeline(){
  // Generate year-by-year timeline from 2023 to now
  const filled=new Set(smFilledDates());
  const start=new Date('2018-03-01');
  const end=new Date();
  const months=[];
  const d=new Date(start);
  while(d<=end){
    const ym=d.toISOString().slice(0,7);
    const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const days=[];
    for(let i=1;i<=daysInMonth;i++){
      const ds=ym+'-'+String(i).padStart(2,'0');
      days.push({date:ds,filled:filled.has(ds)});
    }
    const filledCount=days.filter(x=>x.filled).length;
    months.push({ym,label:d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}),days,filledCount});
    d.setMonth(d.getMonth()+1);
  }
  return months;
}

function smAvgScores(date){
  const e=state.diary.entries[date];
  if(!e)return{};
  const byPillar={};
  SM_PILLARS.forEach(p=>{
    const scores=p.areas.map(a=>e[a]?.score||0).filter(s=>s>0);
    byPillar[p.name]=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10:0;
  });
  return byPillar;
}

// ── SELF MAP CHARTS ──
function smRadarChart(pillarAvg, size){
  const cx=size/2, cy=size/2, r=size/2-20;
  const pillars=SM_PILLARS;
  const n=pillars.length;
  const angleStep=2*Math.PI/n;
  // Grid
  let svg=`<svg width="${size}" height="${size}" class="radar-svg" viewBox="0 0 ${size} ${size}">`;
  // Background rings
  for(let ring=2;ring<=10;ring+=2){
    const rr=r*ring/10;
    let pts='';
    for(let i=0;i<n;i++){const a=angleStep*i-Math.PI/2;pts+=`${cx+rr*Math.cos(a)},${cy+rr*Math.sin(a)} `;}
    svg+=`<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="0.5" opacity="0.6"/>`;
  }
  // Axis lines + labels
  for(let i=0;i<n;i++){
    const a=angleStep*i-Math.PI/2;
    const x2=cx+r*Math.cos(a), y2=cy+r*Math.sin(a);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="var(--border)" stroke-width="0.5"/>`;
    const lx=cx+(r+14)*Math.cos(a), ly=cy+(r+14)*Math.sin(a);
    const short=pillars[i].name.length>12?pillars[i].name.slice(0,10)+'..':pillars[i].name;
    svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="7" font-weight="600" fill="var(--text-mid)">${short}</text>`;
  }
  // Data polygon
  let pts='';
  for(let i=0;i<n;i++){
    const val=pillarAvg[pillars[i].name]||0;
    const a=angleStep*i-Math.PI/2;
    const rr=r*val/10;
    pts+=`${cx+rr*Math.cos(a)},${cy+rr*Math.sin(a)} `;
  }
  svg+=`<polygon points="${pts}" fill="var(--accent)" fill-opacity="0.15" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`;
  // Data dots
  for(let i=0;i<n;i++){
    const val=pillarAvg[pillars[i].name]||0;
    const a=angleStep*i-Math.PI/2;
    const rr=r*val/10;
    const dx=cx+rr*Math.cos(a), dy=cy+rr*Math.sin(a);
    if(val>0) svg+=`<circle cx="${dx}" cy="${dy}" r="3" fill="${pillars[i].color}" stroke="#fff" stroke-width="1.5"/>`;
  }
  svg+=`</svg>`;
  return svg;
}

function smScoreChart(areaName, days){
  const n=days||60;
  const filled=smFilledDates();
  const data=[];
  filled.forEach(d=>{
    const e=state.diary.entries[d];
    if(e&&e[areaName]&&e[areaName].score>0){
      data.push({date:d,score:e[areaName].score});
    }
  });
  if(data.length<2) return '';
  const w=200,ht=40;
  const xScale=w/(data.length-1);
  let path='M';
  let dots='';
  data.forEach((d,i)=>{
    const x=i*xScale;
    const y=ht-(d.score/10)*ht;
    path+=(i===0?'':' L')+`${x},${y}`;
    dots+=`<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent)" stroke="#fff" stroke-width="1"><title>${d.date}: ${d.score}/10</title></circle>`;
  });
  // Area fill
  const areaPath=path+` L${(data.length-1)*xScale},${ht} L0,${ht} Z`;
  return `<svg width="${w}" height="${ht+4}" viewBox="-2 -2 ${w+4} ${ht+8}" style="display:block">
    <path d="${areaPath}" fill="var(--accent)" fill-opacity="0.08"/>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <text x="0" y="${ht+8}" font-size="7" fill="var(--text-light)">${data[0].date.slice(2)}</text>
    <text x="${w}" y="${ht+8}" font-size="7" fill="var(--text-light)" text-anchor="end">${data[data.length-1].date.slice(2)}</text>
  </svg>`;
}

function smPillarTrendChart(pillarName, days){
  const pillar=SM_PILLARS.find(p=>p.name===pillarName);
  if(!pillar) return '';
  const filled=smFilledDates();
  const data=[];
  filled.forEach(d=>{
    const e=state.diary.entries[d];
    if(!e)return;
    const scores=pillar.areas.map(a=>e[a]?.score||0).filter(s=>s>0);
    if(scores.length) data.push({date:d,avg:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10});
  });
  if(data.length<2) return '';
  const w=140,ht=32;
  const xScale=w/(data.length-1);
  let path='M';
  data.forEach((d,i)=>{
    const x=i*xScale;
    const y=ht-(d.avg/10)*ht;
    path+=(i===0?'':' L')+`${x},${y}`;
  });
  return `<svg width="${w}" height="${ht}" viewBox="-1 -1 ${w+2} ${ht+2}">
    <path d="${path}" fill="none" stroke="${pillar.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </svg>`;
}

let pomodoroState={running:false,seconds:25*60,mode:'work',actionId:null,interval:null,sessions:0};
function pomodoroStart(actionId){
  if(pomodoroState.interval)clearInterval(pomodoroState.interval);
  pomodoroState={running:true,seconds:25*60,mode:'work',actionId:actionId||null,interval:null,sessions:pomodoroState.sessions};
  pomodoroState.interval=setInterval(()=>{
    pomodoroState.seconds--;
    updatePomodoroDisplay();
    if(pomodoroState.seconds<=0){
      clearInterval(pomodoroState.interval);pomodoroState.running=false;
      if(pomodoroState.mode==='work'){
        pomodoroState.sessions++;
        if(pomodoroState.actionId){const a=state.actions.find(x=>x.id===pomodoroState.actionId);if(a){if(!a.pomodoroCount)a.pomodoroCount=0;a.pomodoroCount++;saveState();}}
        try{new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==').play();}catch(e){}
        toast('Pomodoro done! Take a break.');
        pomodoroState.mode='break';pomodoroState.seconds=5*60;
      } else {pomodoroState.mode='work';pomodoroState.seconds=25*60;toast('Break over!');}
      render();
    }
  },1000);
  render();
}
function pomodoroStop(){clearInterval(pomodoroState.interval);pomodoroState.running=false;pomodoroState.seconds=25*60;pomodoroState.mode='work';render();}
function updatePomodoroDisplay(){const el=document.getElementById('pomo-display');if(el){const m=Math.floor(pomodoroState.seconds/60);const s=pomodoroState.seconds%60;el.textContent=`${m}:${s<10?'0':''}${s}`;}}
function pomodoroWidget(){
  if(!pomodoroState.running && pomodoroState.seconds===25*60) return '';
  const m=Math.floor(pomodoroState.seconds/60);const s=pomodoroState.seconds%60;
  const pct=pomodoroState.mode==='work'?(1-pomodoroState.seconds/(25*60))*100:(1-pomodoroState.seconds/(5*60))*100;
  const isWork=pomodoroState.mode==='work';
  return `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:12px;background:${isWork?'rgba(255,69,58,.04)':'rgba(48,209,88,.04)'};border-radius:var(--radius);border:1px solid ${isWork?'rgba(255,69,58,.08)':'rgba(48,209,88,.08)'}">
    <div style="font-size:18px;font-weight:600;font-family:var(--mono);color:${isWork?'var(--danger)':'var(--success)'};letter-spacing:-.02em" id="pomo-display">${m}:${s<10?'0':''}${s}</div>
    <div style="flex:1"><div style="height:2px;background:var(--border-vis);border-radius:1px;overflow:hidden"><div style="height:100%;background:${isWork?'var(--danger)':'var(--success)'};width:${pct}%;transition:width 1s linear"></div></div>
    <div style="font-size:10px;color:var(--text-light);margin-top:3px;font-weight:400">${isWork?'Focus':'Break'}${pomodoroState.sessions?' · '+pomodoroState.sessions+' done':''}</div></div>
    <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="pomodoroStop()">Stop</button>
  </div>`;
}

function startVoiceInput(targetId){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('Speech not supported in this browser');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const recog=new SR();
  recog.continuous=false;recog.interimResults=false;recog.lang='en-GB';
  const btn=document.getElementById('voice-btn-'+targetId);
  if(btn){btn.style.color='var(--danger)';btn.textContent='';}
  recog.onresult=e=>{
    const text=e.results[0][0].transcript;
    const el=document.getElementById(targetId);
    if(el){el.value=(el.value?el.value+' ':'')+text;el.dispatchEvent(new Event('blur'));}
    if(btn){btn.style.color='';btn.textContent='';}
    toast('Transcribed!');
  };
  recog.onerror=e=>{if(btn){btn.style.color='';btn.textContent='';}toast('Voice error: '+e.error);};
  recog.onend=()=>{if(btn){btn.style.color='';btn.textContent='';}};
  recog.start();
}

function smContributionGraph(){
  const filled=smFilledDates();
  const filledSet=new Set(filled);
  // Score intensity per day
  const intensity={};
  filled.forEach(d=>{
    const e=state.diary.entries[d];if(!e)return;
    let cnt=0;
    SM_ALL_AREAS.forEach(a=>{if(e[a]&&(e[a].score||e[a].repeat||e[a].improve||e[a].action))cnt++;});
    intensity[d]=cnt;
  });
  const maxI=Math.max(...Object.values(intensity),1);
  // Last 365 days, week columns
  const end=new Date();const start=new Date(end);start.setDate(start.getDate()-364);
  // Align to Sunday
  start.setDate(start.getDate()-start.getDay());
  let svg=`<svg width="700" height="100" viewBox="0 0 700 100" style="display:block;width:100%">`;
  const cellSize=9,gap=2;
  let week=0;
  const d=new Date(start);
  const monthLabels=[];let lastMonth=-1;
  while(d<=end){
    const dow=d.getDay();
    const ds=d.toISOString().slice(0,10);
    const val=intensity[ds]||0;
    const lvl=val===0?0:Math.ceil((val/maxI)*4);
    const colors=['var(--border)','#9BE9A8','#40C463','#30A14E','#216E39'];
    const x=week*(cellSize+gap)+30;
    const y=dow*(cellSize+gap)+14;
    svg+=`<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="2" fill="${colors[lvl]}" opacity="${filledSet.has(ds)?1:0.6}"><title>${ds}: ${val} areas filled</title></rect>`;
    if(d.getMonth()!==lastMonth){monthLabels.push({x,label:d.toLocaleDateString('en',{month:'short'})});lastMonth=d.getMonth();}
    if(dow===6)week++;
    d.setDate(d.getDate()+1);
  }
  monthLabels.forEach(m=>{svg+=`<text x="${m.x}" y="10" font-size="8" fill="var(--text-light)">${m.label}</text>`;});

function diaryPhoto(date){
  const entry=smEntry(date);
  return entry._photo||null;
}
function capturePhoto(date){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      // Resize to thumbnail
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxW=120;const scale=maxW/img.width;
        canvas.width=maxW;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const thumb=canvas.toDataURL('image/jpeg',0.6);
        const entry=smEntry(date);
        entry._photo=thumb;
        saveState();render();toast('Photo saved');
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// FEATURE 6: MONTHLY REPORT
// ═══════════════════════════════════════
function generateMonthlyReport(){
  const now=new Date();
  const month=now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const ym=now.toISOString().slice(0,7);
  const s=getStats();
  const filled=smFilledDates().filter(d=>d.startsWith(ym));

  let md=`# Self Map & Action Report — ${month}\n\n`;
  md+=`## Action Tracker\n- **${s.total}** total actions, **${s.done}** completed (${Math.round(s.done/Math.max(s.total,1)*100)}%)\n- **${s.overdue}** overdue, **${s.prio}** priority\n\n`;

  // Project breakdown
  md+=`## Projects\n`;
  getProjects().forEach(p=>{
    const items=state.actions.filter(a=>a.project===p);
    const open=items.filter(a=>a.status!=='Done'&&a.status!=='Cancelled').length;
    md+=`- **${p}**: ${open} open / ${items.length} total\n`;
  });

  // Self Map
  md+=`\n## Self Map\n- **${filled.length}** entries this month\n\n`;
  if(filled.length){
    md+=`### Pillar Averages (${month})\n`;
    SM_PILLARS.forEach(pillar=>{
      const scores=[];
      filled.forEach(d=>{
        const e=state.diary.entries[d];if(!e)return;
        pillar.areas.forEach(a=>{if(e[a]?.score)scores.push(e[a].score);});
      });
      const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10:0;
      md+=`- **${pillar.name}**: ${avg}/10\n`;
    });
  }

  // Download as .md
  const blob=new Blob([md],{type:'text/markdown'});
  Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`selfmap_report_${ym}.md`}).click();
  toast('Report downloaded');
  return md;
}

function generateDigestContent(){
  const s=getStats();
  const td=todayISO();
  const filled=smFilledDates();
  const thisWeek=filled.filter(d=>{const diff=(new Date(td)-new Date(d))/864e5;return diff>=0&&diff<7;});

  let body=`Weekly Productivity Digest\n\n`;
  body+=`ACTIONS: ${s.total} total, ${s.done} done, ${s.overdue} overdue\n`;

  const overdue=state.actions.filter(a=>isOverdue(a.due,a.status)).slice(0,5);
  if(overdue.length){
    body+=`\nOverdue:\n`;
    overdue.forEach(a=>body+=`- ${a.action} (${a.owner}, due ${fmtDate(a.due)})\n`);
  }

  body+=`\nSELF MAP: ${thisWeek.length}/7 days filled this week\n`;

  if(thisWeek.length){
    body+=`Pillar scores this week:\n`;
    SM_PILLARS.forEach(p=>{
      const scores=[];
      thisWeek.forEach(d=>{const e=state.diary.entries[d];if(!e)return;p.areas.forEach(a=>{if(e[a]?.score)scores.push(e[a].score);});});
      const avg=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'-';
      body+=`- ${p.name}: ${avg}/10\n`;
    });
  }

  body+=`\nGenerated ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`;
  return body;
}

// RECURRING ACTIONS
// ═══════════════════════════════════════
function checkRecurring(){
  const td=todayISO();
  state.actions.forEach(a=>{
    if(!a.recur||a.status!=='Done')return;
    // Check if we need to spawn a new instance
    const lastDone=a.doneDate||a.due||td;
    const diff=Math.round((new Date(td)-new Date(lastDone))/864e5);
    let spawn=false;
    if(a.recur==='daily'&&diff>=1)spawn=true;
    if(a.recur==='weekly'&&diff>=7)spawn=true;
    if(a.recur==='monthly'&&diff>=30)spawn=true;
    if(spawn&&!state.actions.find(x=>x.recurParent===a.id&&x.status!=='Done')){
      const newDue=a.recur==='daily'?td:a.recur==='weekly'?new Date(Date.now()+7*864e5).toISOString().slice(0,10):new Date(Date.now()+30*864e5).toISOString().slice(0,10);
      state.actions.push({...a,id:uid(),status:'Open',due:newDue,createdAt:td,recurParent:a.id,todayFocus:a.todayFocus});
      saveState();
    }
  });
}

// SELF MAP SEARCH
// ═══════════════════════════════════════
function smSearch(query){
  if(!query||!query.trim())return[];
  const q=query.toLowerCase().trim();
  const results=[];
  const filled=smFilledDates();
  filled.forEach(d=>{
    const e=state.diary.entries[d];if(!e)return;
    SM_ALL_AREAS.forEach(area=>{
      const ae=e[area];if(!ae)return;
      const texts=[ae.repeat,ae.improve,ae.action].filter(Boolean).join(' ');
      if(texts.toLowerCase().includes(q)){
        results.push({date:d,area,score:ae.score,match:texts.slice(Math.max(0,texts.toLowerCase().indexOf(q)-30),texts.toLowerCase().indexOf(q)+q.length+60)});
      }
    });
  });
  return results.sort((a,b)=>b.date.localeCompare(a.date));
}
function renderSmSearch(){
  const q=state.smSearchQuery||'';
  const results=q?smSearch(q):[];
  let h=`<div style="margin-bottom:12px">
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input class="input" style="flex:1;font-size:12px" value="${esc(q)}" placeholder="Search Self Map entries (anger, phone, prayer, wife...)" oninput="state.smSearchQuery=this.value" onkeydown="if(event.key==='Enter')render()">
      <button class="btn btn-primary" style="font-size:11px" onclick="render()">Search</button>
    </div>`;
  if(q&&results.length){
    h+=`<div style="font-size:10px;color:var(--text-light);margin-bottom:6px">${results.length} matches for "${esc(q)}"</div>`;
    results.slice(0,20).forEach(r=>{
      const highlighted=esc(r.match).replace(new RegExp(esc(q),'gi'),m=>'<b style="color:var(--accent)">'+m+'</b>');
      h+=`<div class="card card-hover" onclick="state.diary.viewDate='${r.date}';state.tab='diary';render()" style="padding:8px 12px;margin-bottom:4px;cursor:pointer;font-size:11px">

          <span style="font-family:var(--mono);font-size:9px;color:var(--text-light)">${r.date}</span>
          <span style="font-weight:600">${esc(r.area)}</span>
          ${r.score?`<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:var(--accent);color:#fff">${r.score}/10</span>`:''}
        </div>
        <div style="color:var(--text-mid);font-size:10.5px">...${highlighted}...</div>
      </div>`;
    });
    if(results.length>20) h+=`<div style="font-size:10px;color:var(--text-light);text-align:center;padding:4px">+ ${results.length-20} more</div>`;
  } else if(q){
    h+=`<div style="font-size:11px;color:var(--text-light);padding:12px;text-align:center">No matches found</div>`;
  } else {
    h+=`<div style="font-size:11px;color:var(--text-light);padding:12px;text-align:center">Try: anger, phone, prayer, focus, wife, planning, consistency</div>`;
  }
  h+=`</div>`;
  return h;
}

    <div class="card" style="padding:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:28px;height:28px;border-radius:14px;background:#EDE9FE;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#5B21B6">3</div><div style="font-size:14px;font-weight:700">Import meetings</div></div><div style="font-size:12px;color:var(--text-mid);line-height:1.7">Paste a meeting transcript in the <b>Import</b> tab.<br>Uses 7-column format:<br><span style="font-family:var(--mono);font-size:10px">| # | Action | Owner | Due | Outcome | Project | Status |</span><br>Actions land in the right projects automatically.</div></div>
    <div class="card" style="padding:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="width:28px;height:28px;border-radius:14px;background:#FEF3C7;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#92400E">4</div><div style="font-size:14px;font-weight:700">Updating the app</div></div><div style="font-size:12px;color:var(--text-mid);line-height:1.7">Go to <b>github.com/Xahpos/Action-tracker</b><br>Edit index.html \u2192 Ctrl+A \u2192 paste new code \u2192 Commit<br>Wait 1-2 min \u2192 site updates<br>Data in Google Drive is untouched.</div></div>
  </div></div>`;
}
// ═══════════════════════════════════════
const TABS = [
  {g:"Focus"},
  {id:"inbox",icon:"\u25A1",label:"Inbox",bg:"#C026D3"},
  {id:"today",icon:"\u25C9",label:"Today",bg:"#4A7BF7"},
  {g:"Manage"},
  {id:"actions",icon:"\u2630",label:"Actions",bg:"#E5484D"},
  {id:"kanban",icon:"\u25A5",label:"Kanban"},
  {id:"projects",icon:"\u25A6",label:"Projects"},
  {g:"Reflect"},
  {id:"dashboard",icon:"\u25A3",label:"Dashboard"},
  {id:"stats",icon:"\u25CE",label:"Stats"},
  {id:"diary",icon:"\u270E",label:"Self Map"},
  {g:"AI"},
  {id:"coach",icon:"",label:"AI Coach"},
  {g:"System"},
  {id:"import",icon:"\u2193",label:"Import"},
  {id:"guide",icon:"\u2139",label:"Guide"},
];

function renderNav() {
  const s = getStats();
  const nav = document.getElementById("nav");
  nav.innerHTML = TABS.map(t => {
    if(t.g) return `<div style="padding:0 12px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:rgba(100,90,160,.35);margin:20px 0 6px;padding-left:4px">${t.g}</div>`;
    let badge = "";
    if (t.id==="inbox" && s.inbox>0) badge = `<span class="badge" style="background:${t.bg||'#6B7280'}">${s.inbox}</span>`;
    if (t.id==="today" && s.today>0) badge = `<span class="badge" style="background:${t.bg||'#6B7280'}">${s.today}</span>`;
    if (t.id==="actions" && s.overdue>0) badge = `<span class="badge" style="background:${t.bg||'#6B7280'}">${s.overdue}</span>`;
    return `<button class="${state.tab===t.id?'active':''}" onclick="state.tab='${t.id}';render()">
      <span style="font-size:13px;opacity:.7;width:16px;text-align:center">${t.icon}</span>${t.label}${badge}</button>`;
  }).join("");
  document.getElementById("action-count").textContent = s.total + " actions";
}

function render() {
  try {
    renderNav();
    const main = document.getElementById("main");
    const s = getStats();

    switch(state.tab) {
      case "today": main.innerHTML = renderToday(s); break;
      case "inbox": main.innerHTML = renderInbox(s); break;
      case "dashboard": main.innerHTML = renderDashboard(s); break;
      case "stats": main.innerHTML = renderStatsTab(s); break;
      case "actions": main.innerHTML = renderActions(s); break;
      case "kanban": main.innerHTML = renderKanban(); break;
      case "projects": main.innerHTML = renderProjects(); break;
      case "import": main.innerHTML = renderImport(); break;
      case "calendar": main.innerHTML = renderCalendar(); break;
      case "diary": main.innerHTML = renderDiary(); break;
      case "coach": main.innerHTML = renderCoach(); break;
      case "guide": main.innerHTML = renderGuide(); break;
      default: main.innerHTML = "";
    }
  } catch(err) {
    const main = document.getElementById("main");
    main.innerHTML = `<div style="padding:20px;font-family:monospace">
      <h2 style="color:var(--danger);margin-bottom:10px">Render error in tab: ${state.tab}</h2>
      <pre style="background:#1a1a2e;color:#e74c3c;padding:16px;border-radius:8px;overflow:auto;font-size:12px;line-height:1.6;white-space:pre-wrap">${esc(err.message)}\n\n${esc(err.stack||'')}</pre>
      <p style="margin-top:12px;color:var(--text-mid);font-size:12px">Copy this error and send it back. State debug:</p>
      <pre style="background:#1a1a2e;color:#4ADE80;padding:12px;border-radius:8px;font-size:11px;overflow:auto;max-height:200px;white-space:pre-wrap">tab: ${state.tab}
actions: ${state.actions?.length ?? 'undefined'}
selected type: ${typeof state.selected}
selected is Set: ${state.selected instanceof Set}
dragId: ${state.dragId}
dark: ${state.dark}</pre>
    </div>`;
    console.error('RENDER ERROR:', err);
  }
}

// TODAY TAB
// ═══════════════════════════════════════
function renderToday(s) {
  const td = todayISO();
  const focused = state.actions.filter(a=>a.status!=="Done"&&a.status!=="Cancelled"&&a.todayFocus);
  const dueToday = state.actions.filter(a=>a.status!=="Done"&&a.status!=="Cancelled"&&a.due===td&&!a.todayFocus);
  const upcoming = state.actions.filter(a=>a.due&&a.status!=="Done"&&a.status!=="Cancelled"&&!a.todayFocus&&a.due!==td&&a.due<=new Date(Date.now()+7*864e5).toISOString().slice(0,10)).sort((a,b)=>a.due.localeCompare(b.due)).slice(0,10);
  const dateStr = new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  let h = pomodoroWidget();
  h += `<div class="fade-in"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <h1>Today</h1>
    <div style="display:flex;gap:6px;align-items:center">
      ${!pomodoroState.running?`<button class="btn btn-default" style="font-size:11px;padding:5px 12px;display:flex;align-items:center;gap:5px" onclick="pomodoroStart()">${ICON.play} Focus 25m</button>`:''}
      </div>
  </div>`;
  h += quickAdd();
  h += `<div><p style="font-size:13px;color:var(--text-light);margin:2px 0 16px">${dateStr}</p>`;
  fetchPrayerTimes().then(t=>{const el=document.getElementById("prayer-slot");if(el&&t)el.innerHTML=prayerWidget(t);});
  h += `<div id="prayer-slot"></div>`;

  if (!focused.length && !dueToday.length) {
    h += `<div style="text-align:center;padding:60px 20px;color:var(--text-light)"><div style="font-size:15px;font-weight:600">Nothing for today</div><div style="font-size:12px;margin-top:4px">Mark actions with \u25C9 Today Focus</div></div>`;
  }

  if (focused.length) {
    h += `<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:500;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">\u25C9 Focus (${focused.length})</div>`;
    focused.forEach(a => {
      h += `<div class="card card-hover" onclick="openEdit('${a.id}')" style="padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;gap:8px;align-items:center;border-left:3px solid var(--accent)">
        <div style="flex:1"><div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--text-mid)">${esc(a.num)}</span>
          <span style="font-size:13px;font-weight:500">${esc(a.action)}</span></div>
          <div style="display:flex;gap:6px;margin-top:3px"><span style="font-size:11px;color:var(--text-mid)">${esc(a.owner)}</span>${projTag(a.project)}${a.due?`<span style="font-size:10.5px;color:var(--text-mid)">${fmtDate(a.due)}</span>`:""}</div>
        </div>${actionBtns(a)}</div>`;
    });
    h += `</div>`;
  }

  if (dueToday.length) {
    h += `<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:500;color:var(--danger);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em"> Due today (${dueToday.length})</div>`;
    dueToday.forEach(a => {
      h += `<div class="card card-hover" onclick="openEdit('${a.id}')" style="padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;gap:8px;align-items:center;border-left:3px solid var(--danger)">
        <div style="flex:1"><span style="font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--text-mid)">${esc(a.num)}</span> <span style="font-size:13px">${esc(a.action)}</span>
          <div style="display:flex;gap:6px;margin-top:3px"><span style="font-size:11px;color:var(--text-mid)">${esc(a.owner)}</span>${projTag(a.project)}</div>
        </div>${actionBtns(a)}</div>`;
    });
    h += `</div>`;
  }

  if (upcoming.length) {
    h += `<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:12px"><div style="font-size:11px;font-weight:500;color:var(--text-light);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Upcoming</div>`;
    upcoming.forEach(a => {
      h += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F3F4F6;font-size:12px">
        <span style="font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text-mid);width:32px">${esc(a.num)}</span>
        <span style="flex:1">${esc(a.action)}</span>
        <span style="color:${isOverdue(a.due,a.status)?'var(--danger)':'var(--text-mid)'};font-size:10.5px;font-weight:600">${fmtDate(a.due)}</span>
        ${projTag(a.project)}${actionBtns(a)}</div>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════
// INBOX TAB
// ═══════════════════════════════════════
function renderInbox(s) {
  const inbox = state.actions.filter(a=>a.status!=="Done"&&a.status!=="Cancelled"&&(a.project==="Imported"||a.project==="Untagged"||!a.due||!a.measurable));
  let h = quickAdd() + `<div class="fade-in"><h1>Inbox</h1><p style="font-size:13px;color:var(--text-light);margin:2px 0 16px">Actions needing annotation</p>`;
  if (!inbox.length) {
    h += `<div style="text-align:center;padding:60px 20px;color:var(--text-light)"><div style="font-size:15px;font-weight:600">Inbox empty</div></div>`;
  }
  inbox.forEach((a,i) => {
    const reasons = [];
    if (a.project==="Imported"||a.project==="Untagged") reasons.push("no project");
    if (!a.due) reasons.push("no due date");
    if (!a.measurable) reasons.push("no outcome");
    h += `<div class="card card-hover" onclick="openEdit('${a.id}')" style="padding:12px 16px;margin-bottom:6px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;border-left:2px solid var(--accent);animation:smSlideUp .25s cubic-bezier(.16,1,.3,1) both;animation-delay:${i*30}ms">
      <div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-mid)">${esc(a.num)}</span>
        <span style="font-size:13px;font-weight:600">${esc(a.action)}</span></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span style="font-size:11.5px;color:var(--text-mid)">${esc(a.owner)}</span>${projTag(a.project)}</div>
        <div style="display:flex;gap:4px;margin-top:4px">${reasons.map(r=>`<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,69,58,.06);color:var(--danger);font-weight:500">${r}</span>`).join("")}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0" onclick="event.stopPropagation()">
        <select class="select" style="font-size:10px;width:130px" onchange="patch('${a.id}',{project:this.value})">
          ${getProjects().map(p=>`<option ${p===a.project?'selected':''}>${esc(p)}</option>`).join("")}
        </select>
        <input type="date" class="input" style="font-size:10px;width:130px" value="${a.due||''}" onchange="patch('${a.id}',{due:this.value})">
        ${actionBtns(a)}
      </div></div>`;
  });
  h += `</div>`;
  return h;
}

// DASHBOARD TAB
// ═══════════════════════════════════════
function renderDashboard(s) {
  let h = `<div class="fade-in">
    <div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:linear-gradient(135deg,#1B2332 0%,#2D3C55 100%);border-radius:10px;margin-bottom:16px;color:#F1F5F9">
      <div style="text-align:center;min-width:48px"><div style="font-size:20px;font-weight:600;line-height:1">${s.level}</div><div style="font-size:9px;opacity:0.6;text-transform:uppercase;letter-spacing:0.08em">Level</div></div>
      <div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:10px;opacity:0.7;margin-bottom:3px"><span>${s.xpInLevel}/100 XP</span><span>${s.xp} total</span></div>
        <div style="height:5px;background:rgba(255,255,255,0.1);border-radius:3px"><div class="progress-fill" style="height:5px;background:linear-gradient(90deg,#4A7BF7,#8B5CF6);border-radius:3px;width:${s.xpInLevel}%"></div></div>
      </div>
      <div style="text-align:center;min-width:48px"><div style="font-size:20px;font-weight:600;line-height:1">${s.done}</div><div style="font-size:9px;opacity:0.6;text-transform:uppercase;letter-spacing:0.08em">Done</div></div>
      <div style="text-align:center;min-width:48px"><div style="font-size:20px;font-weight:600;line-height:1">${Math.round(s.done/Math.max(s.total,1)*100)}%</div><div style="font-size:9px;opacity:0.6;text-transform:uppercase;letter-spacing:0.08em">Complete</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h1>Dashboard</h1>
      <button class="btn btn-primary" style="font-size:11px" onclick="weeklyReview()">Weekly Review</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:20px">`;
  [["Total",s.total,"#4A7BF7"],["Open",s.open,"#F59E0B"],["In Prog",s.prog,"#3B82F6"],["Done",s.done,"#30A46C"],["Overdue",s.overdue,"#DC2626"],["Priority",s.prio,"#D946EF"]].forEach(([l,v,c])=>{
    h+=`<div class="card" style="padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:${c}">${v}</div><div style="font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px">${l}</div></div>`;
  });
  h += `</div>`;

  // Priority section
  const prio = state.actions.filter(a=>a.priority&&a.status!=="Done"&&a.status!=="Cancelled");
  if (prio.length) {
    h += `<div class="card" style="border:1px solid #F0ABFC;padding:12px;margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:#86198F;margin-bottom:6px">\u2605 High Priority</div>`;
    prio.forEach(a => {
      h += `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;border-bottom:1px solid #F5D0FE;flex-wrap:wrap">
        <span style="font-family:var(--mono);font-size:10px;font-weight:600;width:32px">${esc(a.num)}</span>
        <span style="flex:1;min-width:140px">${esc(a.action)}</span>
        ${projTag(a.project)}<span style="font-size:10.5px;color:var(--text-mid)">${esc(a.owner)}</span>
        ${actionBtns(a)}</div>`;
    });
    h += `</div>`;
  }

  // Overdue section
  const od = state.actions.filter(a=>isOverdue(a.due,a.status)).slice(0,8);
  if (od.length) {
    h += `<div class="card" style="border:1px solid #FED7AA;padding:12px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:#9A3412;margin-bottom:6px"> Overdue</div>`;
    od.forEach(a => {
      h += `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;border-bottom:1px solid #FED7AA;flex-wrap:wrap">
        <span style="font-family:var(--mono);font-size:10px;font-weight:600;width:32px">${esc(a.num)}</span>
        <span style="flex:1;min-width:140px">${esc(a.action)}</span>
        ${projTag(a.project)}${actionBtns(a)}</div>`;
    });
    h += `</div>`;
  }

  // Owner pills
  const owners = getOwners().slice(0,12);
  h += `<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">By owner</div><div style="display:flex;gap:5px;flex-wrap:wrap">`;
  owners.forEach(o => {
    const cnt = state.actions.filter(a=>a.owner.includes(o)&&a.status!=="Done"&&a.status!=="Cancelled").length;
    if(!cnt) return;
    h += `<button class="btn btn-default" style="padding:4px 10px;font-size:11px" onclick="state.tab='actions';state.fOwner='${esc(o)}';render()">${esc(o)} <span style="opacity:.5">${cnt}</span></button>`;
  });
  h += `</div></div>`;

  // Project cards
  h += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px">`;
  getProjects().forEach(p => {
    const it = state.actions.filter(a=>a.project===p);
    const op = it.filter(a=>a.status!=="Done"&&a.status!=="Cancelled").length;
    const col = WS_COLORS[p]||"#94A3B8";
    h += `<div class="card card-hover" onclick="state.tab='projects';render()" style="padding:12px 14px;border-left:3px solid ${col};cursor:pointer">
      <div style="font-size:12.5px;font-weight:700;margin-bottom:2px">${esc(p)}</div>
      <div style="font-size:11.5px;color:var(--text-mid)">${op} open / ${it.length}</div>
      <div style="height:3px;background:#E8EBF0;border-radius:2px;margin-top:5px"><div style="height:3px;background:${col};border-radius:2px;width:${it.length?Math.round((it.length-op)/it.length*100):0}%"></div></div></div>`;
  });
  h += `</div></div>`;
  return h;
}

// ═══════════════════════════════════════
// STATS TAB
// ═══════════════════════════════════════
function renderStatsTab(s) {
  const byProj = getProjects().map(p => {
    const all = state.actions.filter(a=>a.project===p);
    return {name:p.length>20?p.slice(0,18)+"..":p, open:all.filter(a=>a.status==="Open"||a.status==="In progress").length, done:all.filter(a=>a.status==="Done").length, total:all.length};
  }).filter(p=>p.total>0);
  const maxProj = Math.max(...byProj.map(p=>p.total), 1);

  const byOwner = getOwners().slice(0,10).map(o => {
    const all = state.actions.filter(a=>a.owner.includes(o));
    return {name:o.length>12?o.slice(0,10)+"..":o, open:all.filter(a=>a.status!=="Done"&&a.status!=="Cancelled").length, done:all.filter(a=>a.status==="Done").length};
  });
  const maxOwner = Math.max(...byOwner.map(o=>o.open+o.done), 1);

  let h = `<div class="fade-in"><h1 style="margin-bottom:16px">Stats</h1>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;text-align:center;padding:20px;margin-bottom:14px" class="card">`;
  [["Captured",s.total,"var(--text)"],["Completed",s.done,"var(--success)"],["Overdue",s.overdue,"var(--danger)"],["Priority",s.prio,"var(--text-mid)"],["Meetings",state.meetings.length,"var(--text-mid)"]].forEach(([l,v,c])=>{
    h+=`<div><div style="font-size:24px;font-weight:600;color:${c}">${v}</div><div style="font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em">${l}</div></div>`;
  });
  h += `</div>`;

  // By project bar chart (CSS)
  h += `<div class="card" style="padding:18px;margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">By project</div>`;
  byProj.forEach(p => {
    const col = WS_COLORS[p.name]||"#94A3B8";
    h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

  // Status pie (CSS conic-gradient)
  const statusCounts=STATUSES.map(s=>({s,n:state.actions.filter(a=>a.status===s).length})).filter(x=>x.n>0);
  const total=state.actions.length||1;
  let angle=0;const slices=statusCounts.map(x=>{const deg=x.n/total*360;const r={s:x.s,n:x.n,start:angle,end:angle+deg,c:ST[x.s]?.b||'#E5E7EB'};angle+=deg;return r;});
  const conic=slices.map(r=>`${r.c} ${r.start}deg ${r.end}deg`).join(',');
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">

      </div></div>
    <div class="card" style="padding:18px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Keyboard shortcuts</div>
      <div style="font-size:11.5px;color:var(--text-mid);line-height:1.8">

      </div></div>
  </div>`;

  return h;
}

function renderActions(s) {
  let filtered = state.actions;
  if (state.fStatus==="Active") filtered = filtered.filter(a=>a.status!=="Done"&&a.status!=="Cancelled");
  else if (state.fStatus!=="All") filtered = filtered.filter(a=>a.status===state.fStatus);
  if (state.fProj!=="All") filtered = filtered.filter(a=>a.project===state.fProj);
  if (state.fOwner!=="All") filtered = filtered.filter(a=>a.owner.includes(state.fOwner));
  if (state.fPrio) filtered = filtered.filter(a=>a.priority);
  if (state.search) { const q=state.search.toLowerCase(); filtered=filtered.filter(a=>(a.action+a.num+a.owner).toLowerCase().includes(q)); }

  let h = quickAdd() + `<div class="fade-in"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

    <div style="display:flex;gap:5px"><button class="btn btn-primary" onclick="openAddModal()">+ Add</button><button class="btn btn-default" onclick="exportJSON()">JSON</button><button class="btn btn-default" onclick="exportMD()">MD</button></div></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">

      <button class="btn ${state.fPrio?'btn-primary':'btn-default'}" onclick="state.fPrio=!state.fPrio;render()">\u2605 Priority</button>
      <select class="select" onchange="state.fStatus=this.value;render()">
        <option ${state.fStatus==="Active"?"selected":""}>Active</option><option ${state.fStatus==="All"?"selected":""}>All</option>
        ${STATUSES.map(s=>`<option ${state.fStatus===s?"selected":""}>${s}</option>`).join("")}</select>
      <select class="select" onchange="state.fProj=this.value;render()">
        <option value="All" ${state.fProj==="All"?"selected":""}>All projects</option>
        ${getProjects().map(p=>`<option ${state.fProj===p?"selected":""}>${esc(p)}</option>`).join("")}</select>
      <select class="select" onchange="state.fOwner=this.value;render()">
        <option value="All" ${state.fOwner==="All"?"selected":""}>All owners</option>
        ${getOwners().map(o=>`<option ${state.fOwner===o?"selected":""}>${esc(o)}</option>`).join("")}</select>
    </div>${bulkBar()}`;

  // Store filtered IDs for select-all
  const fids = filtered.map(a=>a.id);
  if (!filtered.length) {
    h += `<div style="text-align:center;padding:40px;color:var(--text-light)">No actions match filters</div>`;
  } else {
    h += `<div class="card" style="overflow:auto;border-radius:8px"><table><thead><tr><th style="width:28px"><input type="checkbox" onchange="selectAllFiltered(this.checked)"></th>${["Action","Owner","Due","Status","Project",""].map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>`;
    // Save filtered IDs globally for select-all
    window._filteredIds = fids;
    filtered.forEach(a => {
      const od = isOverdue(a.due,a.status);
      const sel = state.selected.has(a.id);
      h += `<tr onclick="if(event.ctrlKey||event.metaKey||event.shiftKey){event.preventDefault();toggleSelect('${a.id}');return;}openEdit('${a.id}')" style="cursor:pointer;background:${sel?'#EFF6FF':od?'#FFFBF5':'transparent'}">
        <td onclick="event.stopPropagation()"><input type="checkbox" ${sel?'checked':''} onchange="toggleSelect('${a.id}')"></td>
        <td style="max-width:280px"><div style="font-weight:${a.priority?600:500}">${a.priority?'<span style="color:#D946EF;margin-right:4px">\u2605</span>':''}${esc(a.action)}</div></td>
        <td><span style="font-weight:600;font-size:12px">${esc(a.owner)}</span></td>
        <td>${a.due?`<span style="color:${dueColor(a.due,a.status)};font-weight:${isOverdue(a.due,a.status)?700:500}">${fmtDate(a.due)}</span>`:(a.dueRaw||"\u2014")}</td>
        <td>${statusBadge(a.status)}</td><td>${projTag(a.project,a.subproject)}</td>
        <td onclick="event.stopPropagation()">${actionBtns(a)}</td></tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // Archive
  if (state.archived.length) {
    h += `<details style="margin-top:16px"><summary style="font-size:12px;color:var(--text-light);cursor:pointer;font-weight:600">Archive (${state.archived.length})</summary><div class="card" style="padding:12px;margin-top:6px">`;
    state.archived.forEach(a => {
      h += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F3F4F6;font-size:12px">

    });
    h += `</div></details>`;
  }

  h += `</div>`;
  return h;
}

    </div>`;
  });
  h += `<button class="btn btn-default" style="width:100%;padding:6px;font-size:10px;margin-top:6px" onclick="createProject()">+ New project</button>
  </div>`;
  } // end sidebar if

  h += `<div style="flex:1;min-width:0">

      // Sub-projects with nesting - different colors per depth

function renderImport() {
  return `<div class="fade-in"><h1 style="margin-bottom:4px">Import</h1>
    <p style="font-size:12px;color:var(--text-light);margin-bottom:12px">Paste meeting markdown here. For JSON data files, use the <b>JSON Import</b> button in the sidebar.</p>
    <div class="card" style="padding:16px">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <label class="btn btn-default" style="cursor:pointer">Upload .md<input type="file" accept=".md,.txt" hidden onchange="handleMDUpload(event)"></label>
        <button class="btn btn-primary" onclick="doMDImport()">Import markdown</button>
      </div>
      <textarea id="import-area" class="input" style="width:100%;min-height:250px;font-family:var(--mono);font-size:11.5px;line-height:1.6" placeholder="Paste meeting markdown here...&#10;&#10;### Meeting 18 — 25 Mar 2026: Title&#10;| # | Action | Owner | Due | Measurable Outcome | Project | Status |&#10;|---|--------|-------|-----|-------------------|---------|--------|&#10;| | Do something | Faysal | 1 Apr 2026 | Outcome defined | Project Name | Open |"></textarea>
    </div></div>`;
}
function handleMDUpload(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>document.getElementById("import-area").value=ev.target.result; r.readAsText(f);
}
function doMDImport() {
  const md = document.getElementById("import-area").value;
  if (!md.trim()) return;
  const newActions = importMD(md);
  if (!newActions.length) { toast("No actions found"); return; }
  state.actions = [...state.actions, ...newActions];
  state.meetings.push({name:newActions[0]?.meeting||"Import",date:todayISO(),count:newActions.length});
  saveState(); state.tab = "actions"; render();
  toast(newActions.length + " actions imported");
}

// CALENDAR TAB
// ═══════════════════════════════════════
state.calMonth = new Date().getMonth();
state.calYear = new Date().getFullYear();
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function renderCalendar() {
  const m=state.calMonth, y=state.calYear;
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  let startDay=(first.getDay()+6)%7; // Monday=0
  const daysInMonth=last.getDate();
  const todayStr=todayISO();
  // Get actions with due dates this month
  const monthActions={};
  state.actions.forEach(a=>{if(a.due&&a.due.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)){const d=parseInt(a.due.slice(8));if(!monthActions[d])monthActions[d]=[];monthActions[d].push(a);}});

  let h=`<div class="fade-in"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h1>Calendar</h1>
    <div style="display:flex;gap:5px;align-items:center">
      <button class="btn btn-default" style="padding:5px 10px" onclick="state.calMonth===0?(state.calMonth=11,state.calYear--):state.calMonth--;render()">\u25C0</button>
      <span style="font-size:14px;font-weight:700;min-width:150px;text-align:center">${MONTHS[m]} ${y}</span>
      <button class="btn btn-default" style="padding:5px 10px" onclick="state.calMonth===11?(state.calMonth=0,state.calYear++):state.calMonth++;render()">\u25B6</button>
    </div></div>`;
  h+=`<div class="card" style="overflow:hidden"><div style="display:grid;grid-template-columns:repeat(7,1fr)">`;
  DAYS.forEach(d=>h+=`<div style="padding:8px;font-size:10px;font-weight:700;text-align:center;color:var(--text-light);text-transform:uppercase;background:#F9FAFB;border-bottom:1px solid var(--border)">${d}</div>`);
  for(let i=0;i<startDay;i++)h+=`<div style="padding:8px;border-bottom:1px solid #F3F4F6;min-height:80px;background:#FAFAFA"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const acts=monthActions[d]||[];
    h+=`<div style="padding:6px;border-bottom:1px solid #F3F4F6;border-right:1px solid #F3F4F6;min-height:80px;${isToday?'background:#EFF6FF':''}">
      <div style="font-size:11px;font-weight:${isToday?700:500};color:${isToday?'var(--accent)':'var(--text)'};margin-bottom:4px">${d}</div>`;
    acts.slice(0,3).forEach(a=>{
      const c=WS_COLORS[a.project]||"#94A3B8";
      h+=`<div onclick="openEdit('${a.id}')" style="font-size:9.5px;padding:2px 4px;margin-bottom:2px;border-radius:3px;background:${c}14;color:${c};cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;border-left:2px solid ${c}">${esc(a.action).slice(0,25)}</div>`;
    });
    if(acts.length>3)h+=`<div style="font-size:9px;color:var(--text-light)">+${acts.length-3} more</div>`;
    h+=`</div>`;
  }
  const totalCells=startDay+daysInMonth;
  for(let i=totalCells;i%7!==0;i++)h+=`<div style="padding:8px;border-bottom:1px solid #F3F4F6;min-height:80px;background:#FAFAFA"></div>`;
  h+=`</div></div></div>`;
  return h;
}

  state.dark=!state.dark;

  if(state.dark) document.body.classList.add('dark');

}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='n'){e.preventDefault();openAddModal();}
  if(e.key==='t'){e.preventDefault();state.tab='today';render();}
  if(e.key==='i'){e.preventDefault();state.tab='inbox';render();}
  if(e.key==='a'){e.preventDefault();state.tab='actions';render();}
  if(e.key==='p'){e.preventDefault();state.tab='projects';render();}
  if(e.key==='/'){e.preventDefault();state.tab='actions';render();setTimeout(()=>{const s=document.getElementById('search-input');if(s)s.focus();},100);}
  if(e.key==='d'){e.preventDefault();toggleDark();}
});

// EXPORT MARKDOWN
// ═══════════════════════════════════════
function exportMD() {
  const projs=getProjects();
  let md=`# Action Tracker — Status Report\n**Date:** ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}\n\n`;
  const s=getStats();
  md+=`**Summary:** ${s.total} total, ${s.done} done (${s.pct}%), ${s.overdue} overdue, ${s.prio} priority\n\n`;
  projs.forEach(p=>{
    const items=state.actions.filter(a=>a.project===p);
    const open=items.filter(a=>a.status!=="Done"&&a.status!=="Cancelled");
    if(!open.length)return;
    md+=`## ${p}\n\n| Action | Owner | Due | Status |\n|--------|-------|-----|--------|\n`;
    open.forEach(a=>md+=`| ${a.action} | ${a.owner} | ${a.due?fmtDate(a.due):'TBD'} | ${a.status} |\n`);
    md+='\n';
  });
  const blob=new Blob([md],{type:'text/markdown'});
  Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'tracker_report_'+todayISO()+'.md'}).click();
  toast('Report exported');
}
